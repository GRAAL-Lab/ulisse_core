controller_node:
    ros__parameters:
        ControlLoopPeriod: 100          # ms
        ControlMode: 0                  # 0=ThrusterMapping, 1=DynamicModel
        EnableThrusters: true

        PosAcceptanceRadius: 5.0

        SpeedLimiter: 2.5               # m/s [Be careful to make the mapping saturation bigger than this values] (to avoid double saturation)
        JogLimiter: 0.3                 # rad/s
        ThrusterPercLimit: 70.0         # percent

        DistanceThreshold: 5.0          # m
        MaximumTargetDistance: 50000.0  # m

        Speed2ThrusterCoefficient: 210.0
        Jog2ThrusterCoefficient: 1050.0

        Hold:
            HysteresisCoefficient: 0.5
            enableCurrentCompensation: true
            # above CurrentMax the desired heading will be set equal to the
            # estimated current direction
            # below CurrentMin the desired heading is the actual one
            CurrentMin: 0.0
            CurrentMax: 0.1

        GotoHoldAfterMove: true

        UsePosVelObserver: false

        SlowDownOnTurns:
            enable: false
            HeadingErrorMin: 10.0
            HeadingErrorMax: 25.0
            AlphaMin: 0.1
            AlphaMax: 1.0

        AvoidRotationCloseToTarget:
            enable: true
            SpeedMin: 0.1
            SpeedMax: 0.25
            BetaMin: 0.01
            BetaMax: 1.0

        PIDPosition:
            Kp: 0.05
            Ki: 0.0
            Kd: 0.0
            Kff: 0.0
            N: 10.0
            Tr: 0.5

        PIDSpeed:
            Kp: 0.4
            Ki: 0.4
            Kd: 0.0
            Kff: 0.6
            N: 10.0
            Tr: 0.5

        PIDHeading:
            Kp: 0.75
            Ki: 0.0
            Kd: 1.5
            Kff: 0.0
            N: 10.0
            Tr: 0.5

        ThrusterMapping:
            # input saturation limits
            SurgeMin: 0.0  
            SurgeMax: 5.0    # Be careful to make the PID saturation smaller than this values
            YawrateMin: -0.5
            YawRateMax: 0.5  # Be careful to make the PID saturation smaller than this values
            # mapping parameters
            lambda_pos: 13.0
            lambda_neg: 9.1
            motors_distance: 0.6925
            cX: [0.0, 0.0, 45.47]
            cN: [520.0, 0.0, 600.0]
            b1_pos: 0.000303
            b2_pos: 0.034
            b1_neg: 0.00014
            b2_neg: 0.055
            Inertia: [400.0, 400.0, 50.0]
