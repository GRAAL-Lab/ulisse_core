controller_node:
    ros__parameters:
        ControlLoopPeriod: 100          # ms
        ControlMode: 0                  # 0=ThrusterMapping, 1=DynamicModel
        EnableThrusters: true

        MaxPhysicalSpeed: 4.5           # m/s
        SpeedLimiter: 4.5               # m/s
        MaxPhysicalJog: 30.0            # deg/s
        JogLimiter: 30.0                # deg/s
        ThrustersPercLimit: 70          # percent
        #LeftThrusterBias: 0             # percent
        #RightThrusterBias: 0            # percent
        #ReverseLeftThruster: false
        #ReverseRightThruster: false
        SpeedLoopGain: 0.25
        JogLoopGain: 0.5
        JogPriority: 0.85               # 1.0 jog only 0.5 speedjog 0.0 speedonly

        DistanceThreshold: 5.0          # m
        MaximumTargetDistance: 50000.0  # m
        SafetyHeartbeatTimeout: 3000    # ms
        SlowPrintPeriod: 0              # ms

        Speed2ThrusterCoefficient: 210.0
        Jog2ThrusterCoefficient: 1050.0

        ReverseThrusterCoefficient: 0.49 #0.4608
        HoldHysteresisCoefficient: 0.5

        HoldCurrentCompensation:
             enable: true
             # above CurrentMax the desired heading will be set equal to the
             # estimated current direction
             # below CurrentMin the desired heading is the actual one
             CurrentMin: 0.0
             CurrentMax: 0.1

        GotoHoldAfterMove: true

        UsePosVelObserver: false

        SlowDownOnTurns:
            enable: true
            HeadingErrorMin: 10.0
            HeadingErrorMax: 25.0
            AlphaMin: 0.1
            AlphaMax: 1.0

        AvoidRotationCloseToTarget:
            enable: true
            SpeedMin: 0.1
            SpeedMax: 0.25
            BetaMin: 0.01
            BetaMax: 1.0

        PIDPosition:
            Kp: 0.05
            Ki: 0.0
            Kd: 0.0
            Kff: 0.0
            N: 10.0
            Tr: 0.5

        PIDSpeed:
            Kp: 0.4
            Ki: 0.4
            Kd: 0.0
            Kff: 0.6
            N: 10.0
            Tr: 0.5

        PIDHeading:
            Kp: 0.75
            Ki: 0.0
            Kd: 1.5
            Kff: 0.0
            N: 10.0
            Tr: 0.5

        ThrusterMapping:
            #RPMToPercentPositive: 69.0
            #RPMToPercentNegative: 50.5
            # dati paper
            lambda_pos: 13.0
            lambda_neg: 9.1
            motors_distance: 0.6925
            cX: [0.0, 0.0, 45.47]
            cN: [520.0, 0.0, 600.0]
            b1_pos: 0.000303
            b2_pos: 0.034
            b1_neg: 0.00014
            b2_neg: 0.055
            Inertia: [400.0, 400.0, 50.0]
