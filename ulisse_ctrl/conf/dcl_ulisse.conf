dcl_ulisse:
{
    controlLoopPeriod: 100;         # ms
    ctrlMode: 2;                    # 0=ThrusterMapping, 1=classicPidControl, 2=ComputedTorque
    enableThrusters: true;
    thrusterPercLimit: 100.0;        # percent

    # input saturation limits
    surgeMin: -5.0;
    surgeMax: 5.0;    # Be careful to make the PID Surge saturation smaller than this values !
    yawRateMin: -0.5;
    yawRateMax: 0.5;  # Be careful to make the PID Heading saturation smaller than this values !

    ulisseModel:
    {
        lambdaPos: 13.8;
        lambdaNeg: 10.1;
        motorsTransversalDistance: 0.6925;
        motorsLongitudinalDistance: 1.5;


        cX: [0.0, 0.0, 65.0];
        cY: [0.0, 0.0, 300.0];
        cN: [477.0, 0.0, 0.0];
        cNneg: [0.0, 0.0, 1377.0];
        b1Pos: 3.03E-4;
        b2Pos: 0.0;
        b1Neg: 1.37E-4;
        b2Neg: 0.0;
        kPos: 0.069;
        kNeg: 0.31;
        rpmDynState: 0.9718;
        rpmDynPosPerc: 0.3887;
        rpmDynNegPerc: 0.2845;

        inertia: [400.0, 400.0, 300.0];
        hullWidth: 0.4;
    };

	
    thrusterMapping:
    {
        pidSurge:
        {
            kp: 8.0;
            ki: 0.4;
            kd: 0.0;
            kff: 0.6;
            n: 10.0;
            tr: 0.5;
            sat: 2.5;
        };
    };

    classicPidControl:
    {
        pidSurge:
        {
            kp: 260.0
            ki: 25.0;
            kd: 0.0;
            kff: 0.6;
            n: 10.0;
            tr: 0.5;
            sat:400.0;
        };

        pidYawRate:
        {
            kp: 500.0;#1000.0;
            ki: 200.0;#400.0;
            kd: 0.0;
            kff: 0.0;
            n: 10.0;
            tr: 0.5;
            sat: 560.0;
         };
    };

    computedTorqueControl:
    {
        pidSurge:
        {
            kp: 200.0
            ki: 0.0;
            kd: 0.0;
            kff: 0.6;
            n: 10.0;
            tr: 0.5;
            sat:400.0;
        };

        pidYawRate:
        {
            kp: 600.0;#450.0;
            ki: 0.0;
            kd: 0.0;
            kff: 0.0;
            n: 10.0;
            tr: 0.5;
            sat: 560.0;
        };
    };
};
