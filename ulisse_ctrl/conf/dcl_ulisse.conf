dcl_ulisse:
{
    controlLoopPeriod: 100;         # ms
    ctrlMode: 2;                    # 0=ThrusterMapping, 1=classicPidControl, 2=ComputedTorque
    enableThrusters: true;
    thrusterPercLimit: 85.0;        # percent

    # input saturation limits
    surgeMin: -5.0;
    surgeMax: 5.0;    # Be careful to make the PID Surge saturation smaller than this values !
    yawRateMin: -0.5;
    yawRateMax: 0.5;  # Be careful to make the PID Heading saturation smaller than this values !

    ulisseModel:
    {
        lambdaPos: 13.0;
        lambdaNeg: 9.1;
        motorsDistance: 0.6925;
        cX: [0.0, 0.0, 40.29];
        cY: [0.0, 0.0, 80.58];
        cN: [326.69, 0.0, 272.58];
        cNneg: [-169.75, 0.0, 841.03];
        b1Pos: 3.03E-4;
        b2Pos: 0.0;
        b1Neg: 1.46E-4;
        b2Neg: 2.5E-2;
        inertia: [400.0, 400.0, 400.0];
        hullWidth: 0.4;
    };

	
    thrusterMapping:
    {
        pidSurge:
        {
            kp: 8.0;
            ki: 0.4;
            kd: 0.0;
            kff: 0.6;
            n: 10.0;
            tr: 0.5;
            sat: 2.5;
        };
    };

    classicPidControl:
    {
        pidSurge:
        {
            kp: 260.0
            ki: 25.0;
            kd: 0.0;
            kff: 0.6;
            n: 10.0;
            tr: 0.5;
            sat:400.0;
        };

        pidYawRate:
        {
            kp: 500.0;#1000.0;
            ki: 200.0;#400.0;
            kd: 0.0;
            kff: 0.0;
            n: 10.0;
            tr: 0.5;
            sat: 560.0;
         };
    };

    computedTorqueControl:
    {
        pidSurge:
        {
            kp: 200.0
            ki: 0.0;
            kd: 0.0;
            kff: 0.6;
            n: 10.0;
            tr: 0.5;
            sat:400.0;
        };

        pidYawRate:
        {
            kp: 450.0;
            ki: 0.0;
            kd: 0.0;
            kff: 0.0;
            n: 10.0;
            tr: 0.5;
            sat: 560.0;
        };
    };
};
