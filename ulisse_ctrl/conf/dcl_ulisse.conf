dcl_ulisse:
{
    controlLoopPeriod: 100;         # ms
    ctrlMode: 2;                  # 0=ThrusterMapping, 1=DynamicModel, 2=SlidingMode
    enableThrusters: true;
    thrusterPercLimit: 70.0;         # percent

    # input saturation limits
    surgeMin: -5.0;
    surgeMax: 5.0;    # Be careful to make the PID Surge saturation smaller than this values !
    yawRateMin: -0.5;
    yawRateMax: 0.5;  # Be careful to make the PID Heading saturation smaller than this values !

    ulisseModel:
    {
        lambdaPos: 13.0;
        lambdaNeg: 9.1;
        motorsDistance: 0.6925;
        cX: [0.0, 0.0, 45.47];
        cN: [520.0, 0.0, 600.0];
        b1Pos: 0.000303;
        b2Pos: 0.034;
        b1Neg: 0.00014;
        b2Neg: 0.055;
        inertia: [400.0, 400.0, 50.0];
    };
	
    thrusterMapping:
    {
        pidSurge:
        {
            kp: 0.4;
            ki: 0.4;
            kd: 0.0;
            kff: 0.6;
            n: 10.0;
            tr: 0.5;
            sat: 2.5;
        };
    };

    classicPidControl:
    {
        pidSurge:
        {
            kp: 0.4;
            ki: 0.4;
            kd: 0.0;
            kff: 0.6;
            n: 10.0;
            tr: 0.5;
            sat:400.0;
        };

        pidYawRate:
        {
            kp: 0.75;
            ki: 0.00;
            kd: 0.0;
            kff: 0.0;
            n: 10.0;
            tr: 0.5;
            sat: 560.0;
         };
    };
	
    slidingMode:
    {
        gain1: 1.0;
        surgeGain: 0.2;
        forceLimiter: 400.0;
        gain2: 0.5;
        headingGain: 5.5;
        torqueLimiter: 560.0;
    };

    filterParameter:
    {
        gains: [0.9, 0.1];
    };
};
