dcl_ulisse:
{
    controlLoopPeriod: 100;         # ms
    ctrlMode: 1;                  # 0=ThrusterMapping, 1=DynamicModel, 2=SlidingMode
    enableThrusters: true;
    thrusterPercLimit: 70.0;         # percent

    # input saturation limits
    surgeMin: -5.0;
    surgeMax: 5.0;    # Be careful to make the PID Surge saturation smaller than this values !
    yawRateMin: -0.5;
    yawRateMax: 0.5;  # Be careful to make the PID Heading saturation smaller than this values !

    ulisseModel:
    {
        lambdaPos: 13.0;
        lambdaNeg: 9.1;
        motorsDistance: 0.7;
        cX: [0.0, 0.0, 33.97];
        cN: [270.0, 0.0, 236.0];
        b1Pos: 0.000303;
        b2Pos: 0.013;
        b1Neg: 0.000143;
        b2Neg: 0.021;
        inertia: [400.0, 400.0, 400.0];
    };
	
    thrusterMapping:
    {
        pidSurge:
        {
            kp: 4.4;
            ki: 0.6;
            kd: 0.0;
            kff: 0.5;
            n: 10.0;
            tr: 0.5;
            sat: 2.5;
        };
    };

    classicPidControl:
    {
        pidSurge:
        {
            kp: 700.0
            ki: 300.0;
            kd: 0.0;
            kff: 0.6;
            n: 10.0;
            tr: 0.5;
            sat:400.0;
        };

        pidYawRate:
        {
            kp: 700.0;
            ki: 300.0;
            kd: 0.0;
            kff: 0.0;
            n: 10.0;
            tr: 0.5;
            sat: 560.0;
         };
    };
	
    slidingMode:
    {
        gain1: 1.0;
        surgeGain: 0.2;
        forceLimiter: 400.0;
        gain2: 10.0;
        headingGain: 0.28;
        torqueLimiter: 560.0;
    };

};
